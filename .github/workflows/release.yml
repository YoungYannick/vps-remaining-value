name: Build and Release Assets

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create release package
        run: |
          mkdir -p release-package
          cp dist/VPSRemainingValue.exe release-package/
          cp .env.example release-package/
          ZIP_NAME="VPSRemainingValue-win-x64-${{ github.ref_name }}.zip"
          cd release-package
          zip -r ../${ZIP_NAME} .
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Generate Changelog
        id: changelog
        run: |
          git fetch --prune
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGELOG=$(git log $PREVIOUS_TAG..${{ github.ref_name }} --pretty=format:"* %s (%h)")
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ env.CHANGELOG }}
          draft: false
          prerelease: false
          files: ${{ env.ZIP_NAME }}